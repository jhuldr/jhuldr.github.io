<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var path = window.location.pathname.replace(/\/+$/, "") || "/";
        var redirects = {
          "/Peirong": "/peirong",
          "/Peirong/Misc": "/peirong/misc",
          "/Members": "/members",
          "/Openings": "/openings",
          "/Publications": "/#publications",
          "/publications": "/#publications"
        };

        if (redirects[path]) {
          window.location.replace(redirects[path]);
          return;
        }

        window.location.replace("/");
      })();
    </script>
  </head>
  <body>
    <p>Redirecting…</p>
  </body>
</html>
